---
name: "Build: Packages Docker Image"
"on":
  push:
    branches:
      - main
    paths:
      - "packages/**/*"
      - "scripts/**/*"
      - .github/workflows/build-packages-docker-image.yml

concurrency:
  group: "${{github.workflow}}-${{github.ref}}-packages-docker-image"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-packages-docker-image:
    env:
      APP_OWNER: credfeto
      APP_NAME: dev-packages
      CONTAINER_REGISTRY: ${{secrets.CONTAINER_REGISTRY}}
      APP_PATH: packages

    runs-on: ubuntu-latest
    steps:
      - name: "Check out repo"
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: "Copy common scripts"
        shell: bash
        run: |
          SCRIPTS="${{github.workspace}}/scripts"
          APP="${{github.workspace}}/${{env.APP_PATH}}"
          cp "$SCRIPTS/install-dotnet" "$APP"
          cp "$SCRIPTS/optimise-git" "$APP"
          cp "$SCRIPTS/setup-certificates" "$APP"
          cp "$SCRIPTS/setup-git" "$APP"
          cp "$SCRIPTS/setup-gpg" "$APP"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4.0.0

      - name: "Docker Trust Enable"
        shell: bash
        run: |
          TRUST="${{env.DOCKER_CONTENT_TRUST}}"
          echo "DOCKER_CONTENT_TRUST_ORIGINAL=${TRUST}" >> "$GITHUB_ENV"
          echo "DOCKER_CONTENT_TRUST=1" >> "$GITHUB_ENV"

      - name: "Docker: Test Build"
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{github.workspace}}/${{env.APP_PATH}}
          platforms: linux/amd64
          load: true
          tags: |
            ${{env.APP_OWNER}}/${{env.APP_NAME}}:test
          provenance: false

      - name: "Docker: Build with tags"
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{github.workspace}}/${{env.APP_PATH}}
          platforms: linux/amd64
          push: true
          tags: |
            ${{env.CONTAINER_REGISTRY}}/${{env.APP_OWNER}}/${{env.APP_NAME}}:latest
          provenance: false

      - name: "Docker Trust Restore"
        shell: bash
        run: |
          TRUST="${{env.DOCKER_CONTENT_TRUST_ORIGINAL}}"
          echo "DOCKER_CONTENT_TRUST=${TRUST}" >> "$GITHUB_ENV"
