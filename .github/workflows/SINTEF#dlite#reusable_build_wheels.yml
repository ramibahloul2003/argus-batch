name: "Reusable - Build wheels"

"on":
  workflow_call:
    inputs:
      matrix_json:
        description: JSON array for strategy.matrix.include
        required: true
        type: string
      container_registry:
        description: Container registry used for Linux wheel images
        required: false
        default: ghcr.io
        type: string
      update_version_from_tag:
        description: Update CMakeLists.txt VERSION from refs/tags/v* before building
        required: false
        default: false
        type: boolean
      upload_artifacts:
        description: Upload built wheels as workflow artifacts
        required: false
        default: false
        type: boolean
      artifact_name_prefix:
        description: Artifact name prefix used when upload_artifacts is true
        required: false
        default: wheels
        type: string
      cibw_debug_traceback:
        description: Enable CIBW_DEBUG_TRACEBACK
        required: false
        default: "TRUE"
        type: string

jobs:
  build_wheels:
    name: Build wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix_json) }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Update version
      if: inputs.update_version_from_tag
      shell: bash
      run: |
        python - <<'PY'
        import os
        import pathlib
        import re

        version = os.environ["GITHUB_REF"].removeprefix("refs/tags/v")
        p = pathlib.Path("CMakeLists.txt")
        txt = p.read_text()

        new = re.sub(r'(?m)^( +VERSION +)[0-9.]+$', r'\g<1>' + version, txt)
        if new == txt:
            raise SystemExit("VERSION line not updated (pattern did not match)")

        p.write_text(new)
        print("Updated VERSION to", version)
        PY

    - name: Install Python for running cibuildwheel
      uses: actions/setup-python@v6
      with:
        python-version: "3.13.5"
        architecture: ${{ matrix.arch == '' && 'x86' || matrix.arch == 'arm64' && 'arm64' || 'x64' }}

    # https://cibuildwheel.pypa.io/en/stable/faq/#macos-building-cpython-38-wheels-on-arm64
    - name: Install Python3.8 from python.org for macOS compiling
      if: matrix.os == 'macos-14'
      run: |
        url="https://www.python.org/ftp/python/3.8.10/python-3.8.10-macos11.pkg"
        curl $url -o python-3.8.10-macos11.pkg
        sudo installer -pkg python-3.8.10-macos11.pkg -target /

    - name: Login to GitHub Container Registry
      if: startsWith(matrix.os, 'ubuntu')
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.container_registry }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install cibuildwheel
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements_wheels.txt

    # See pyproject.toml (under python/) for cibuildwheel configuration
    - name: Build wheels with cibuildwheel
      run: |
        python -m cibuildwheel --print-build-identifiers python
        python -m cibuildwheel --output-dir wheelhouse python
      env:
        CIBW_DEBUG_TRACEBACK: ${{ inputs.cibw_debug_traceback }}
        CIBW_BUILD_VERBOSITY: "3"
        CIBW_BEFORE_BUILD: |
          python -V
          which python
          python -m pip --version
          python -m pip install -U pip setuptools wheel
        CIBW_BUILD: cp3${{ contains(matrix.py_minors, ',') && format('{{{0}}}', matrix.py_minors) || matrix.py_minors }}-${{ matrix.system_type[0] }}${{ matrix.arch != '' && '_' || '' }}${{ matrix.arch }}
        CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=${{ matrix.deployment-target }}"
        CIBW_MANYLINUX_X86_64_IMAGE: ${{ inputs.container_registry }}/sintef/dlite-python-manylinux${{ matrix.system_type[1] }}_x86_64:latest
        CIBW_MANYLINUX_I686_IMAGE:   ${{ inputs.container_registry }}/sintef/dlite-python-manylinux${{ matrix.system_type[1] }}_i686:latest
        CIBW_MUSLLINUX_X86_64_IMAGE: ${{ inputs.container_registry }}/sintef/dlite-python-musllinux${{ matrix.system_type[1] }}_x86_64:latest
        CIBW_MUSLLINUX_I686_IMAGE:   ${{ inputs.container_registry }}/sintef/dlite-python-musllinux${{ matrix.system_type[1] }}_i686:latest

    - name: Store wheels for publishing
      if: inputs.upload_artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact_name_prefix }}_${{ matrix.os }}_${{ matrix.system_type[0] }}_${{ matrix.system_type[1] }}_${{ matrix.arch }}_${{ matrix.py_minors }}
        path: wheelhouse/*.whl