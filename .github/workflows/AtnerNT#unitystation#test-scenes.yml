name: Tests

permissions: write-all

on:
  push:
    branches:
      - develop
    paths:
      - "Tools/UnityLicense.ulf"
      - "UnityProject/**"
      - ".github/workflows/**"
      - "Docker/**"
  pull_request:
    branches:
      - develop
    paths:
      - "Tools/UnityLicense.ulf"
      - "UnityProject/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  # Perform unit testing
  performTest:
    name: SCENES - Unit testing on ${{ matrix.unityVersion }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projectPath:
          - UnityProject
        targetPlatform:
          - StandaloneWindows64

    steps:
      # Checkout repository (required to test local actions)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set the UNITY_LICENSE environment variable with contents of $LICENSE_FILE_PATH
      - name: Setup license
        env:
          LICENSE_FILE_PATH: ./Tools/UnityLicense.ulf
        run: |
          echo 'UNITY_LICENSE<<LICENSE-EOF' >> "$GITHUB_ENV"
            echo "License file contents:"
            cat "$LICENSE_FILE_PATH"
            cat "$LICENSE_FILE_PATH" >> "$GITHUB_ENV"
          printf "\nLICENSE-EOF" >> "$GITHUB_ENV"

      - name: Setup license login stuff
        env:
          ACCOUNT_FILE_PATH: ./Tools/thisshitisgettinghackedlol
        run: |
          echo 'UNITY_EMAIL='$(head -n 1 "$ACCOUNT_FILE_PATH") >> "$GITHUB_ENV"
          echo 'UNITY_PASSWORD='$(head -n 2 "$ACCOUNT_FILE_PATH" | tail -n 1) >> "$GITHUB_ENV"
      - name: Verify environment variables
        run: |
          echo "UNITY_EMAIL value is set: ${{ env.UNITY_EMAIL != '' }}"
          echo "UNITY_PASSWORD value is set: ${{ env.UNITY_PASSWORD != '' }}"
          echo "UNITY_LICENSE length: ${#UNITY_LICENSE}"

      - name: Installs dotnet and restores packages
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "7.0.x"
      - run: dotnet tool install --global NuGetForUnity.Cli
      - run: nugetforunity restore ${{ matrix.projectPath }}

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library2-${{ env.PROJECT_PATH }}-${{ env.UNITY_VERSION }}-${{ runner.os }}
          restore-keys: |
            Library2-${{ env.PROJECT_PATH }}-${{ env.UNITY_VERSION }}-
            Library2-${{ env.PROJECT_PATH }}-

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 8

      - name: Create testReports directory if it doesn't exist
        run: mkdir -p testReports/${{ matrix.targetPlatform }}
      - name: Set permissions for testReports directory
        run: chmod -R 777 testReports

      # Run tests - only edit mode supported
      # Note: exits with non-zero on legitimate test fails, "if: always()" is needed for reporting
      - name: Run Scene tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        with:
          customParameters: '-nographics -testCategory "Scenes"'
          projectPath: ${{ matrix.projectPath }}
          customImage: "unityci/editor:ubuntu-6000.0.48f1-base-3.1.0"
          artifactsPath: ./testReports/${{ matrix.targetPlatform }}
          testMode: editmode

      - name: Upload Raw Test Results
        if: always() && steps.tests.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Raw Test Results
          path: testReports/${{ matrix.targetPlatform }}/editmode-results.xml

      # Copy ExtentReports contents and generate .html report
      - name: Copy ExtentReports
        if: always()
        run: |
          sudo mkdir -p testReports/${{ matrix.targetPlatform }}/
          sudo cp -r ./Tools/ExtentReports/* testReports/${{ matrix.targetPlatform }}/

      # Upload test results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test results
          path: ./testReports/${{ matrix.targetPlatform }}
