---

name: Coverage Report

"on":
  pull_request:
    paths-ignore:
      - docs/**
    types: [opened, reopened, synchronize]

jobs:

  pytest-coverage:

    runs-on: ubuntu-24.04

    permissions:
      contents: read
      pull-requests: write

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          cache-environment: true
          create-args: >-
            python=3.10
          micromamba-version: 1.5.10-0
          environment-file: conda-environment-dev.yml
          post-cleanup: all

      - name: Install Python dependencies with Poetry
        # Pytest-related dependencies are in the `dev` dependency group,
        # so we install that group and skip the other groups.
        run: >
          ${MAMBA_EXE} run --name mxcubecore
          poetry install --only=dev,main

      - name: Check tests with Pytest and write coverage report
        run: >
          set -o pipefail

          ${MAMBA_EXE} run --name mxcubecore
          pytest
          --cov=mxcubecore
          --junitxml=pytest.xml
          --cov-report=term-missing:skip-covered
          |
          tee pytest-coverage.txt

      - name: Write Python tests coverage comments on pull request
        id: coverage-comment
        uses: MishaKav/pytest-coverage-comment@v1.1.40
        with:
          repo-token: ${{ secrets.CI_TOKEN }}
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml
          report-only-changed-files: true

      - name: Check the output coverage
        run: |
          echo "Coverage Percantage - ${{ steps.coverage-comment.outputs.coverage }}"
          echo "Coverage Warnings - ${{ steps.coverage-comment.outputs.warnings }}"
          echo "Coverage Errors - ${{ steps.coverage-comment.outputs.errors }}"
          echo "Coverage Failures - ${{ steps.coverage-comment.outputs.failures }}"
          echo "Coverage Skipped - ${{ steps.coverage-comment.outputs.skipped }}"
          echo "Coverage Tests - ${{ steps.coverage-comment.outputs.tests }}"
          echo "Coverage Time - ${{ steps.coverage-comment.outputs.time }}"
