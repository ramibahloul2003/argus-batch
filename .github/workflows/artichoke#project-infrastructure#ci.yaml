---
name: CI
"on":
  push:
    branches:
      - trunk
  pull_request:
    branches:
      - trunk
  schedule:
    - cron: "0 0 * * TUE"
permissions: {}
jobs:
  terraform:
    name: Lint and format terraform
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    # https://www.terraform.io/docs/github-actions/getting-started.html
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::447522982029:role/gha-tf-lint-artichoke-s3-ro-20241019065142842900000002
          role-session-name: GitHubActionsSession@ci-terraform

      - name: Show AWS caller identity
        run: aws sts get-caller-identity

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.x

      - name: "Format terraform sources"
        run: terraform fmt -recursive -check -diff

      - name: "Init and validate aws environment"
        run: |-
          terraform -chdir=aws init
          terraform -chdir=aws validate -no-color

      - name: "Init and validate github-org-artichoke environment"
        run: |-
          terraform -chdir=github-org-artichoke init
          terraform -chdir=github-org-artichoke validate -no-color

      - name: "Init and validate github-org-artichokeruby environment"
        run: |-
          terraform -chdir=github-org-artichokeruby init
          terraform -chdir=github-org-artichokeruby validate -no-color

      - name: "Init and validate github-org-artichoke-ruby environment"
        run: |-
          terraform -chdir=github-org-artichoke-ruby init
          terraform -chdir=github-org-artichoke-ruby validate -no-color

      - name: "Init and validate aws-account-bootstrapping project"
        run: |
          terraform -chdir=terraform/projects/aws-account-bootstrapping init
          terraform -chdir=terraform/projects/aws-account-bootstrapping validate -no-color

      - name: "Init and validate codecov-website project"
        run: |
          terraform -chdir=terraform/projects/codecov-website init
          terraform -chdir=terraform/projects/codecov-website validate -no-color

      - name: "Init and validate domain-redirects project"
        run: |
          terraform -chdir=terraform/projects/domain-redirects init
          terraform -chdir=terraform/projects/domain-redirects validate -no-color

      - name: "Init and validate github-actions-oidc-provider project"
        run: |
          terraform -chdir=terraform/projects/github-actions-oidc-provider init
          terraform -chdir=terraform/projects/github-actions-oidc-provider validate -no-color

      - name: "Init and validate github-actions-terraform-linting project"
        run: |
          terraform -chdir=terraform/projects/github-actions-terraform-linting init
          terraform -chdir=terraform/projects/github-actions-terraform-linting validate -no-color

      - name: "Init and validate github-pages-dns project"
        run: |
          terraform -chdir=terraform/projects/github-pages-dns init
          terraform -chdir=terraform/projects/github-pages-dns validate -no-color

      - name: "Init and validate google-site-verification project"
        run: |
          terraform -chdir=terraform/projects/google-site-verification init
          terraform -chdir=terraform/projects/google-site-verification validate -no-color

      - name: "Init and validate remote-state project"
        run: |
          terraform -chdir=terraform/projects/remote-state init
          terraform -chdir=terraform/projects/remote-state validate -no-color

      - name: "Init and validate reserved-s3-buckets project"
        run: |
          terraform -chdir=terraform/projects/reserved-s3-buckets init
          terraform -chdir=terraform/projects/reserved-s3-buckets validate -no-color

      - name: "Init and validate route53-dns project"
        run: |
          terraform -chdir=terraform/projects/route53-dns init
          terraform -chdir=terraform/projects/route53-dns validate -no-color

  ruby:
    name: Lint and format Ruby
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Install Ruby toolchain
        uses: ruby/setup-ruby@d5126b9b3579e429dd52e51e68624dda2e05be25 # v1.267.0
        with:
          ruby-version: ".ruby-version"
          bundler-cache: true

      - name: Lint and check formatting with Rubocop
        run: bundle exec rubocop --format github

  text:
    name: Lint and format text
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js runtime
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "lts/*"

      - name: Install Nodejs toolchain
        run: npm ci

      - name: Lint and check formatting with prettier
        run: npx prettier --check '**/*'

      - name: Lint YAML sources with yamllint
        run: |
          yamllint --version
          echo "Linting YAML sources with yamllint ..."
          yamllint --strict --format github .
          echo "OK"
