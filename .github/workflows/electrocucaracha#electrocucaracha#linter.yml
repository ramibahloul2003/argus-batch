name: Lint Code Base
"on":
  push:
  pull_request:
permissions: read-all
jobs:
  check-super-linter:
    name: Check syntax (super-linter)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      models: read
      issues: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run super-linter validation
        id: linter-validation
        # yamllint disable rule:line-length
        uses: super-linter/super-linter@9e863354e3ff62e0727d37183162c4a88873df41 # 8.6.0
        # yamllint enable rule:line-length
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          LINTER_RULES_PATH: "/"
          SAVE_SUPER_LINTER_OUTPUT: "true"
          DEFAULT_BRANCH: "${{ github.head_ref || github.ref_name }}"
          IGNORE_GITIGNORED_FILES: "true"
      - name: Upload linter logs
        if: failure()
        id: upload-linter-logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: super-linter-logs
          path: ./super-linter-output/
      - name: Get log URL and metadata
        if: failure()
        id: log-metadata
        env:
          ARTIFACT_URL: ${{ steps.upload-linter-logs.outputs.artifact-url }}
        # yamllint disable rule:line-length
        run: |
          if [ -n "$ARTIFACT_URL" ]; then
            log_url="$ARTIFACT_URL"
          else
            log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          if [ -f "./super-linter-output/super-linter/super-linter.json" ]; then
            super_linter_version="$(jq -r '.version' "./super-linter-output/super-linter/super-linter.json")" || super_linter_version="unknown"
          else
            super_linter_version="unknown"
          fi

          commit_id="${{ github.sha }}"

          {
            echo "log_url=${log_url}"
            echo "super_linter_version=${super_linter_version}"
            echo "commit_id=${commit_id}"
          } >> "$GITHUB_ENV"

          {
            echo "log_url=${log_url}"
            echo "super_linter_version=${super_linter_version}"
            echo "commit_id=${commit_id}"
          } >> "$GITHUB_OUTPUT"
        # yamllint enable rule:line-length
      - name: Collect AI investigation context
        if: failure()
        id: investigation-context
        env:
          API_URL: ${{ github.api_url }}
          BEFORE_SHA: ${{ github.event.before }}
          COMMIT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          LOG_URL: ${{ steps.log-metadata.outputs.log_url }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SUPER_LINTER_VERSION: >-
            ${{ steps.log-metadata.outputs.super_linter_version }}
        run: |
          set -euo pipefail
          readonly super_linter_error_pattern='error|failed|failure|exception|traceback|fatal|not found|undefined'
          readonly workflow_log_error_pattern="${super_linter_error_pattern}|duplicate|clone|threshold"

          base_sha=""
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "${PR_BASE_SHA:-}" ]; then
            base_sha="$PR_BASE_SHA"
          elif [ -n "${BEFORE_SHA:-}" ] && \
            [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            base_sha="$BEFORE_SHA"
          elif git rev-parse "${COMMIT_SHA}^" >/dev/null 2>&1; then
            base_sha="$(git rev-parse "${COMMIT_SHA}^")"
          fi

          changed_files="Unable to determine changed files"
          commit_diff_excerpt="Unable to determine commit diff excerpt"
          if [ -n "$base_sha" ] && \
            git cat-file -e "${base_sha}^{commit}" >/dev/null 2>&1; then
            changed_files="$(git diff --name-status "$base_sha" "$COMMIT_SHA" \
              | sed '/^$/d' | head -n 80 || true)"
            commit_diff_excerpt="$(git diff --minimal --unified=1 "$base_sha" "$COMMIT_SHA" \
              | head -c 4000 || true)"
          fi

          log_file_count="$(find ./super-linter-output -type f 2>/dev/null | wc -l || true)"
          log_files="$(find ./super-linter-output -type f 2>/dev/null \
            | sort | head -n 40 || true)"

          error_excerpt="$(rg -n -i \
            "$super_linter_error_pattern" \
            ./super-linter-output 2>/dev/null | head -n 80 | head -c 4000 || true)"

          run_log_excerpt=""
          run_logs_zip="$(mktemp)"
          run_logs_dir="$(mktemp -d)"
          cleanup_temp_logs() {
            rm -f "$run_logs_zip"
            rm -rf "$run_logs_dir"
          }
          trap cleanup_temp_logs EXIT
          if curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}/repos/${REPOSITORY}/actions/runs/${RUN_ID}/logs" \
            -o "$run_logs_zip"; then
            if unzip -qq "$run_logs_zip" -d "$run_logs_dir"; then
              run_log_excerpt="$(rg -n -i \
                "$workflow_log_error_pattern" \
                "$run_logs_dir" 2>/dev/null | head -n 80 | head -c 4000 || true)"
            fi
          fi

          if [ -n "$run_log_excerpt" ]; then
            if [ -n "$error_excerpt" ]; then
              error_excerpt="$(printf '%s\n\n[workflow_run_logs]\n%s' "$error_excerpt" "$run_log_excerpt")"
            else
              error_excerpt="$run_log_excerpt"
            fi
          fi

          if [ -z "$error_excerpt" ]; then
            error_excerpt="No obvious error keywords were found in saved super-linter logs."
          fi

          DELIM="EOF_$(uuidgen)"
          {
            printf "evidence<<%s\n" "$DELIM"
            printf "run_url: %s\n" "$LOG_URL"
            printf "event_name: %s\n" "$EVENT_NAME"
            printf "ref_name: %s\n" "$REF_NAME"
            printf "commit_sha: %s\n" "$COMMIT_SHA"
            printf "base_sha: %s\n" "${base_sha:-unknown}"
            printf "super_linter_version: %s\n" "$SUPER_LINTER_VERSION"
            printf "log_file_count: %s\n" "$log_file_count"
            printf "\n[changed_files]\n%s\n" "$changed_files"
            printf "\n[super_linter_output_files]\n%s\n" "$log_files"
            printf "\n[error_excerpt]\n%s\n" "$error_excerpt"
            printf "\n[git_diff_excerpt]\n%s\n" "$commit_diff_excerpt"
            printf "%s\n" "$DELIM"
          } >> "$GITHUB_OUTPUT"
      - name: AI Linter Analysis
        if: failure()
        uses: actions/ai-inference@a7805884c80886efc241e94a5351df715968a0ad # 2.1.1
        id: ai-linter-analysis
        with:
          enable-github-mcp: true
          github-mcp-token: ${{ secrets.GITHUB_MCP_TOKEN }} # zizmor: ignore[secrets-outside-env]
          github-mcp-toolsets: context,repos,pull_requests,issues,actions
          model: mistral-ai/Ministral-3B
          prompt: |
            Analyze this failed super-linter run.

            Use available GitHub MCP tools first to collect information from:
            - this workflow run and its job/step failures
            - related workflow logs/artifacts
            - commit/PR changed files and diffs
            - repository context relevant to linter configuration

            Repository: ${{ github.repository }}
            Run ID: ${{ github.run_id }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Log URL: ${{ steps.log-metadata.outputs.log_url }}
            Super-linter version: ${{ steps.log-metadata.outputs.super_linter_version }}

            If a required tool/action is unavailable, use the fallback evidence
            below and clearly state the limitation.

            Output format requirements:
            - Diagnosis
            - Why this is likely the root cause (cite evidence snippets)
            - Proposed fix (exact unified diff)
            - Confidence level (high/medium/low)
            - What additional data would reduce uncertainty

            Evidence:
            ${{ steps.investigation-context.outputs.evidence }}
          system-prompt: |
            You are an expert software engineer who specializes in
            diagnosing and fixing software build and runtime failures.
            Always provide structured reasoning and propose concrete fixes
            when possible.

            Task: Determine the most probable root cause for this failed
            super-linter run.

            Execution rules:
            - Prioritize collecting evidence using available GitHub MCP tools.
            - Cross-reference findings across workflow logs, run metadata,
              changed files, and commit diff.
            - If MCP access fails or specific data cannot be fetched, proceed
              with provided fallback evidence and explicitly mention missing
              data.

            Objectives:
            1. **Diagnosis:** Identify patterns, anomalies, or dependencies
            that could explain the failure. What is the most probable root
            cause?
            2. **Reasoning:** Explain why this root cause is plausible,
            referencing specific snippets from the evidence sections.
            3. **Resolution:** If a fix is evident, describe your reasoning
            process and propose an exact code or configuration change.
            Present your solution as a unified diff (diff format).
            4. **Reflection:** If no clear fix is identifiable, summarize
            which parts of the evidence are ambiguous and what further
            information would be needed to proceed.

            Goal: Deliver an insightful and technically sound explanation
            that not only solves the issue but also strengthens
            understanding of the system's behavior and failure patterns.
          # jscpd:ignore-start
      - name: Get the entire analysis output
        id: get-analysis-output
        if: failure()
        env:
          RESPONSE_FILE: ${{ steps.ai-linter-analysis.outputs.response-file }}
        run: |
          DELIM="EOF_$(uuidgen)"
          {
            printf "response<<%s\n" "$DELIM"
            cat "$RESPONSE_FILE"
            printf "\n%s\n" "$DELIM"
          } >> "$GITHUB_OUTPUT"
        # jscpd:ignore-end
      # yamllint disable rule:line-length
      - uses: jayqi/failed-build-issue-action@1a893bbf43ef1c2a8705e2b115cd4f0fe3c5649b # 1.2.0
        # yamllint enable rule:line-length
        if: failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          title-template: >-
            super-linter GitHub action has failed
          label-name: super-linter-issue
          body-template: |
            The linter step has failed. Please check for new major versions
            and update manually.

            Please check workflow run `${{ github.run_id }}` for more
            details.

            ## AI Analysis of Linter Failures
            ${{ steps.get-analysis-output.outputs.response }}
